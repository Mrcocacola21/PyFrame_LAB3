<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Products{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        margin: 0;
        background: #f6f7fb;
        color: #1a1a1a;
      }
      header {
        background: #1f2937;
        color: #fff;
        padding: 16px 24px;
      }
      main {
        padding: 24px;
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
        background: #fff;
      }
      th, td {
        border: 1px solid #e5e7eb;
        padding: 10px 12px;
        text-align: left;
      }
      th {
        background: #f3f4f6;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .btn {
        display: inline-block;
        background: #2563eb;
        color: #fff;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
        border: 0;
        cursor: pointer;
        font-size: 14px;
      }
      .btn.secondary {
        background: #6b7280;
      }
      .btn.danger {
        background: #dc2626;
      }
      form.inline {
        display: inline;
      }
      .card {
        background: #fff;
        padding: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        max-width: 500px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Products</h1>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
